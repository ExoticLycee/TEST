<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>WARPAH — Lacak Lokasi</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
<style>
  :root {
    --green: #00FF64;
    --green-dim: #00b846;
    --bg: #050c0a;
    --panel: #0a1410;
    --border: #0d2a1a;
    --text: #c8ffe0;
    --muted: #2a6645;
  }

  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: var(--bg);
    color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh;
    overflow-x: hidden;
    position: relative;
  }

  /* grid bg */
  body::before {
    content: '';
    position: fixed;
    inset: 0;
    background-image:
      linear-gradient(rgba(0,255,100,0.03) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,100,0.03) 1px, transparent 1px);
    background-size: 40px 40px;
    pointer-events: none;
    z-index: 0;
  }

  .container {
    position: relative;
    z-index: 1;
    max-width: 860px;
    margin: 0 auto;
    padding: 32px 20px 60px;
  }

  /* Header */
  header {
    text-align: center;
    margin-bottom: 36px;
  }

  .logo {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 6px;
    color: var(--muted);
    margin-bottom: 8px;
  }

  h1 {
    font-size: 48px;
    font-weight: 700;
    letter-spacing: 2px;
    text-transform: uppercase;
    line-height: 1;
    color: var(--green);
    text-shadow: 0 0 30px rgba(0,255,100,0.4), 0 0 80px rgba(0,255,100,0.15);
  }

  h1 span { color: var(--text); }

  .sub {
    font-family: 'Share Tech Mono', monospace;
    font-size: 12px;
    color: var(--muted);
    letter-spacing: 3px;
    margin-top: 6px;
  }

  /* Map container */
  #map-wrapper {
    position: relative;
    border: 1px solid var(--border);
    border-radius: 4px;
    overflow: hidden;
    background: #040a07;
    height: 400px;
    box-shadow: 0 0 0 1px var(--green-dim) inset, 0 0 40px rgba(0,255,100,0.05);
  }

  #map { width: 100%; height: 100%; }

  .map-corner {
    position: absolute;
    width: 18px; height: 18px;
    border-color: var(--green);
    border-style: solid;
    z-index: 10;
    pointer-events: none;
  }
  .map-corner.tl { top: 8px; left: 8px; border-width: 2px 0 0 2px; }
  .map-corner.tr { top: 8px; right: 8px; border-width: 2px 2px 0 0; }
  .map-corner.bl { bottom: 8px; left: 8px; border-width: 0 0 2px 2px; }
  .map-corner.br { bottom: 8px; right: 8px; border-width: 0 2px 2px 0; }

  /* Scan line overlay */
  #map-wrapper::after {
    content: '';
    position: absolute;
    inset: 0;
    background: repeating-linear-gradient(
      0deg,
      transparent,
      transparent 2px,
      rgba(0,0,0,0.08) 2px,
      rgba(0,0,0,0.08) 4px
    );
    pointer-events: none;
    z-index: 5;
  }

  /* Panels */
  .panels {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 12px;
    margin-top: 12px;
  }

  @media (max-width: 600px) {
    .panels { grid-template-columns: 1fr; }
  }

  .panel {
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    padding: 18px 20px;
    position: relative;
    overflow: hidden;
  }

  .panel::before {
    content: '';
    position: absolute;
    top: 0; left: 0; right: 0;
    height: 2px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    opacity: 0.5;
  }

  .panel-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 10px;
    letter-spacing: 3px;
    color: var(--muted);
    text-transform: uppercase;
    margin-bottom: 10px;
  }

  .coord-row {
    display: flex;
    align-items: baseline;
    gap: 8px;
    margin-bottom: 6px;
  }

  .coord-key {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    color: var(--muted);
    min-width: 28px;
  }

  .coord-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 20px;
    color: var(--green);
    letter-spacing: 1px;
    text-shadow: 0 0 12px rgba(0,255,100,0.5);
  }

  .coord-unit {
    font-size: 11px;
    color: var(--muted);
  }

  .stat-grid {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
  }

  .stat-item {}

  .stat-label {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    margin-bottom: 2px;
  }

  .stat-val {
    font-family: 'Share Tech Mono', monospace;
    font-size: 17px;
    color: var(--text);
  }

  .stat-val.accent { color: var(--green); }

  /* Button */
  #btn-locate {
    display: block;
    width: 100%;
    margin-top: 12px;
    padding: 14px 0;
    background: transparent;
    border: 1px solid var(--green);
    border-radius: 4px;
    color: var(--green);
    font-family: 'Share Tech Mono', monospace;
    font-size: 13px;
    letter-spacing: 4px;
    text-transform: uppercase;
    cursor: pointer;
    position: relative;
    overflow: hidden;
    transition: all 0.3s;
  }

  #btn-locate::before {
    content: '';
    position: absolute;
    inset: 0;
    background: var(--green);
    transform: scaleX(0);
    transform-origin: left;
    transition: transform 0.3s ease;
    z-index: 0;
  }

  #btn-locate:hover::before { transform: scaleX(1); }
  #btn-locate:hover { color: #000; box-shadow: 0 0 30px rgba(0,255,100,0.3); }
  #btn-locate span { position: relative; z-index: 1; }

  #btn-locate:disabled {
    opacity: 0.4;
    cursor: not-allowed;
  }

  /* Status bar */
  #status-bar {
    display: flex;
    align-items: center;
    gap: 10px;
    margin-top: 12px;
    padding: 10px 14px;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 4px;
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 1px;
  }

  .dot {
    width: 8px; height: 8px;
    border-radius: 50%;
    background: var(--muted);
    flex-shrink: 0;
    transition: background 0.3s;
  }

  .dot.active {
    background: var(--green);
    box-shadow: 0 0 8px var(--green);
    animation: blink 1.2s infinite;
  }

  .dot.error { background: #ff4040; box-shadow: 0 0 8px #ff4040; }

  @keyframes blink {
    0%, 100% { opacity: 1; }
    50% { opacity: 0.3; }
  }

  #status-text { color: var(--muted); }

  /* Accuracy bar */
  .acc-bar-wrap {
    margin-top: 8px;
    height: 3px;
    background: var(--border);
    border-radius: 2px;
    overflow: hidden;
  }

  .acc-bar {
    height: 100%;
    background: linear-gradient(90deg, var(--green), #00ffc8);
    border-radius: 2px;
    transition: width 0.6s ease;
    box-shadow: 0 0 8px var(--green);
  }

  /* Copy btn */
  .copy-btn {
    font-family: 'Share Tech Mono', monospace;
    font-size: 9px;
    letter-spacing: 2px;
    color: var(--muted);
    background: none;
    border: 1px solid var(--muted);
    padding: 3px 8px;
    border-radius: 2px;
    cursor: pointer;
    transition: all 0.2s;
    margin-top: 10px;
  }
  .copy-btn:hover { color: var(--green); border-color: var(--green); }

  /* Placeholder */
  .map-placeholder {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 10px;
    z-index: 2;
  }

  .radar-ring {
    width: 80px; height: 80px;
    border-radius: 50%;
    border: 1px solid var(--green-dim);
    position: relative;
    animation: radar-spin 3s linear infinite;
  }

  @keyframes radar-spin {
    to { transform: rotate(360deg); }
  }

  .radar-ring::before {
    content: '';
    position: absolute;
    top: -1px; left: 50%;
    width: 2px; height: 40px;
    background: linear-gradient(180deg, var(--green), transparent);
    transform-origin: bottom center;
    transform: translateX(-50%);
    box-shadow: 0 0 8px var(--green);
  }

  .map-placeholder p {
    font-family: 'Share Tech Mono', monospace;
    font-size: 11px;
    letter-spacing: 3px;
    color: var(--muted);
  }

  /* Leaflet overrides */
  .leaflet-tile-pane { filter: brightness(0.75) saturate(0.6) hue-rotate(100deg); }
  .leaflet-control-zoom { display: none; }
</style>
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
</head>
<body>

<div class="container">

  <header>
    <div class="logo">// WARPAH EXPLOITS //</div>
    <h1>GPS <span>TRACKER</span></h1>
    <div class="sub">— REAL-TIME LOCATION SYSTEM —</div>
  </header>

  <!-- Map -->
  <div id="map-wrapper">
    <div class="map-corner tl"></div>
    <div class="map-corner tr"></div>
    <div class="map-corner bl"></div>
    <div class="map-corner br"></div>
    <div id="map-placeholder" class="map-placeholder">
      <div class="radar-ring"></div>
      <p>AWAITING SIGNAL...</p>
    </div>
    <div id="map"></div>
  </div>

  <!-- Status -->
  <div id="status-bar">
    <div class="dot" id="dot"></div>
    <span id="status-text">SISTEM SIAP — KLIK TOMBOL UNTUK MULAI</span>
  </div>

  <!-- Button -->
  <button id="btn-locate" onclick="getLocation()"><span>⊕ LACAK LOKASI SAYA</span></button>

  <!-- Panels -->
  <div class="panels">
    <div class="panel">
      <div class="panel-label">// KOORDINAT</div>
      <div class="coord-row">
        <span class="coord-key">LAT</span>
        <span class="coord-val" id="lat">—</span>
        <span class="coord-unit">°</span>
      </div>
      <div class="coord-row">
        <span class="coord-key">LNG</span>
        <span class="coord-val" id="lng">—</span>
        <span class="coord-unit">°</span>
      </div>
      <button class="copy-btn" onclick="copyCoords()">[ COPY KOORDINAT ]</button>
    </div>

    <div class="panel">
      <div class="panel-label">// DETAIL SINYAL</div>
      <div class="stat-grid">
        <div class="stat-item">
          <div class="stat-label">AKURASI</div>
          <div class="stat-val accent" id="accuracy">— m</div>
          <div class="acc-bar-wrap"><div class="acc-bar" id="acc-bar" style="width:0%"></div></div>
        </div>
        <div class="stat-item">
          <div class="stat-label">ALTITUDE</div>
          <div class="stat-val" id="altitude">— m</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">KECEPATAN</div>
          <div class="stat-val" id="speed">— km/h</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">HEADING</div>
          <div class="stat-val" id="heading">—°</div>
        </div>
      </div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
  let map = null;
  let marker = null;
  let circle = null;
  let watchId = null;

  function setStatus(msg, state) {
    document.getElementById('status-text').textContent = msg;
    const dot = document.getElementById('dot');
    dot.className = 'dot';
    if (state) dot.classList.add(state);
  }

  function initMap(lat, lng) {
    const placeholder = document.getElementById('map-placeholder');
    placeholder.style.display = 'none';

    if (!map) {
      map = L.map('map', {
        zoomControl: false,
        attributionControl: false
      }).setView([lat, lng], 17);

      L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png').addTo(map);

      // Custom marker
      const icon = L.divIcon({
        html: `
          <div style="position:relative;width:32px;height:32px">
            <div style="position:absolute;inset:0;border-radius:50%;border:2px solid #00FF64;animation:ping 1.5s infinite;opacity:0.6"></div>
            <div style="position:absolute;inset:6px;border-radius:50%;background:#00FF64;box-shadow:0 0 12px #00FF64"></div>
          </div>
          <style>@keyframes ping{0%{transform:scale(1);opacity:0.6}100%{transform:scale(2.5);opacity:0}}</style>
        `,
        className: '',
        iconSize: [32, 32],
        iconAnchor: [16, 16]
      });

      marker = L.marker([lat, lng], { icon }).addTo(map);
    } else {
      map.setView([lat, lng], map.getZoom());
      marker.setLatLng([lat, lng]);
    }
  }

  function updateCircle(lat, lng, accuracy) {
    if (circle) map.removeLayer(circle);
    circle = L.circle([lat, lng], {
      radius: accuracy,
      color: '#00FF64',
      fillColor: '#00FF64',
      fillOpacity: 0.08,
      weight: 1,
      dashArray: '4 4'
    }).addTo(map);
  }

  function updateUI(pos) {
    const { latitude, longitude, accuracy, altitude, speed, heading } = pos.coords;

    document.getElementById('lat').textContent = latitude.toFixed(7);
    document.getElementById('lng').textContent = longitude.toFixed(7);
    document.getElementById('accuracy').textContent = Math.round(accuracy) + ' m';

    // Accuracy bar: 0m=100%, 500m=0%
    const pct = Math.max(0, Math.min(100, ((500 - accuracy) / 500) * 100));
    document.getElementById('acc-bar').style.width = pct + '%';

    document.getElementById('altitude').textContent = altitude ? Math.round(altitude) + ' m' : '— m';
    document.getElementById('speed').textContent = speed ? Math.round(speed * 3.6) + ' km/h' : '0 km/h';
    document.getElementById('heading').textContent = heading ? Math.round(heading) + '°' : '—°';

    initMap(latitude, longitude);
    updateCircle(latitude, longitude, accuracy);

    setStatus(`LIVE — AKURASI ±${Math.round(accuracy)}m`, 'active');
  }

  function getLocation() {
    if (!navigator.geolocation) {
      setStatus('ERROR: BROWSER TIDAK MENDUKUNG GPS', 'error');
      return;
    }

    const btn = document.getElementById('btn-locate');
    btn.disabled = true;
    btn.querySelector('span').textContent = '◌ MENDAPATKAN SINYAL...';
    setStatus('SCANNING — MENCARI SINYAL GPS...', 'active');

    if (watchId !== null) navigator.geolocation.clearWatch(watchId);

    watchId = navigator.geolocation.watchPosition(
      (pos) => {
        updateUI(pos);
        btn.disabled = false;
        btn.querySelector('span').textContent = '↺ REFRESH LOKASI';
      },
      (err) => {
        const msgs = {
          1: 'AKSES DITOLAK — IZINKAN LOKASI DI BROWSER',
          2: 'SINYAL TIDAK TERSEDIA',
          3: 'TIMEOUT — COBA LAGI'
        };
        setStatus('ERROR: ' + (msgs[err.code] || err.message), 'error');
        btn.disabled = false;
        btn.querySelector('span').textContent = '⊕ COBA LAGI';
      },
      {
        enableHighAccuracy: true,
        timeout: 15000,
        maximumAge: 0
      }
    );
  }

  function copyCoords() {
    const lat = document.getElementById('lat').textContent;
    const lng = document.getElementById('lng').textContent;
    if (lat === '—') return;
    navigator.clipboard.writeText(`${lat}, ${lng}`).then(() => {
      setStatus('KOORDINAT DISALIN KE CLIPBOARD!', 'active');
      setTimeout(() => setStatus('LIVE — TRACKING AKTIF', 'active'), 2000);
    });
  }
</script>
</body>
</html>
