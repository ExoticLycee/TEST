<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no">
<title>WARPAH — GPS Tracker</title>
<link href="https://fonts.googleapis.com/css2?family=Share+Tech+Mono&family=Rajdhani:wght@300;500;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.css"/>
<style>
  :root {
    --green: #00FF64;
    --green-dim: #00b846;
    --bg: #050c0a;
    --panel: #0a1410;
    --border: #0d2a1a;
    --text: #c8ffe0;
    --muted: #2a6645;
  }
  * { margin:0; padding:0; box-sizing:border-box; }
  body {
    background: var(--bg); color: var(--text);
    font-family: 'Rajdhani', sans-serif;
    min-height: 100vh; overflow-x: hidden;
  }
  body::before {
    content:''; position:fixed; inset:0;
    background-image:
      linear-gradient(rgba(0,255,100,0.025) 1px, transparent 1px),
      linear-gradient(90deg, rgba(0,255,100,0.025) 1px, transparent 1px);
    background-size:40px 40px; pointer-events:none; z-index:0;
  }
  .container { position:relative; z-index:1; max-width:880px; margin:0 auto; padding:26px 16px 60px; }

  header { text-align:center; margin-bottom:24px; }
  .logo { font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:6px; color:var(--muted); margin-bottom:6px; }
  h1 { font-size:42px; font-weight:700; letter-spacing:2px; text-transform:uppercase; line-height:1; color:var(--green); text-shadow:0 0 30px rgba(0,255,100,0.4),0 0 80px rgba(0,255,100,0.15); }
  h1 span { color:var(--text); }
  .sub { font-family:'Share Tech Mono',monospace; font-size:11px; color:var(--muted); letter-spacing:3px; margin-top:5px; }

  /* ── MAP ── */
  #map-wrapper {
    position:relative; border:1px solid var(--green-dim); border-radius:4px;
    overflow:hidden; background:#040a07; height:420px;
    box-shadow:0 0 40px rgba(0,255,100,0.06);
    transform:translateZ(0); /* force GPU layer */
  }
  #map { width:100%; height:100%; }

  .map-corner { position:absolute; width:18px; height:18px; border-color:var(--green); border-style:solid; z-index:500; pointer-events:none; }
  .tl { top:8px;    left:8px;   border-width:2px 0 0 2px; }
  .tr { top:8px;    right:8px;  border-width:2px 2px 0 0; }
  .bl { bottom:8px; left:8px;   border-width:0 0 2px 2px; }
  .br { bottom:8px; right:8px;  border-width:0 2px 2px 0; }

  #lock-btn {
    position:absolute; bottom:14px; right:14px; z-index:500;
    background:rgba(10,20,16,0.9); border:1px solid var(--green-dim);
    border-radius:3px; color:var(--green);
    font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:2px;
    padding:6px 10px; cursor:pointer; transition:all 0.2s;
    backdrop-filter:blur(4px);
  }
  #lock-btn:hover,#lock-btn.locked { background:var(--green); color:#000; border-color:var(--green); }

  /* scanline overlay — pointer-events:none so map stays interactive */
  #map-wrapper::after {
    content:''; position:absolute; inset:0;
    background:repeating-linear-gradient(0deg,transparent,transparent 3px,rgba(0,0,0,0.05) 3px,rgba(0,0,0,0.05) 4px);
    pointer-events:none; z-index:400;
  }

  /* Placeholder */
  #map-placeholder {
    position:absolute; inset:0; display:flex; flex-direction:column;
    align-items:center; justify-content:center; gap:14px;
    z-index:450; background:var(--bg);
  }
  .radar-wrap { position:relative; width:90px; height:90px; }
  .radar-ring { width:90px; height:90px; border-radius:50%; border:1px solid var(--green-dim); position:absolute; inset:0; }
  .radar-ring2 { width:55px; height:55px; border-radius:50%; border:1px solid rgba(0,255,100,0.2); position:absolute; top:50%; left:50%; transform:translate(-50%,-50%); }
  .radar-sweep {
    position:absolute; inset:0; border-radius:50%; overflow:hidden;
    animation:sweep 2.2s linear infinite;
  }
  .radar-sweep::after {
    content:''; position:absolute; top:50%; left:50%;
    width:50%; height:2px;
    background:linear-gradient(90deg,rgba(0,255,100,0.9),transparent);
    transform-origin:left center; margin-top:-1px;
  }
  @keyframes sweep { to { transform:rotate(360deg); } }
  .radar-dot { position:absolute; top:50%; left:50%; width:6px; height:6px; background:var(--green); border-radius:50%; transform:translate(-50%,-50%); box-shadow:0 0 8px var(--green); }
  #map-placeholder p { font-family:'Share Tech Mono',monospace; font-size:10px; letter-spacing:3px; color:var(--muted); }

  /* ── STATUS ── */
  #status-bar {
    display:flex; align-items:center; gap:10px;
    margin-top:10px; padding:9px 14px;
    background:var(--panel); border:1px solid var(--border); border-radius:4px;
    font-family:'Share Tech Mono',monospace; font-size:11px; letter-spacing:1px;
  }
  .dot { width:8px; height:8px; border-radius:50%; background:var(--muted); flex-shrink:0; transition:background 0.3s; }
  .dot.active { background:var(--green); box-shadow:0 0 8px var(--green); animation:blink 1.2s infinite; }
  .dot.error  { background:#ff4040; box-shadow:0 0 8px #ff4040; }
  @keyframes blink { 50% { opacity:0.2; } }
  #status-text { color:var(--muted); flex:1; overflow:hidden; text-overflow:ellipsis; white-space:nowrap; }

  #kalman-badge {
    font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:1px;
    padding:2px 6px; border-radius:2px;
    background:transparent; border:1px solid var(--border); color:var(--muted);
    white-space:nowrap; transition:all 0.4s; flex-shrink:0;
  }
  #kalman-badge.good { border-color:var(--green); color:var(--green); }

  /* ── BUTTON ── */
  #btn-locate {
    display:block; width:100%; margin-top:10px; padding:13px 0;
    background:transparent; border:1px solid var(--green); border-radius:4px;
    color:var(--green); font-family:'Share Tech Mono',monospace;
    font-size:12px; letter-spacing:4px; text-transform:uppercase;
    cursor:pointer; position:relative; overflow:hidden; transition:color 0.3s;
  }
  #btn-locate::before {
    content:''; position:absolute; inset:0; background:var(--green);
    transform:scaleX(0); transform-origin:left; transition:transform 0.3s ease; z-index:0;
  }
  #btn-locate:hover::before { transform:scaleX(1); }
  #btn-locate:hover { color:#000; box-shadow:0 0 28px rgba(0,255,100,0.3); }
  #btn-locate span { position:relative; z-index:1; }
  #btn-locate:disabled { opacity:0.35; cursor:not-allowed; pointer-events:none; }

  /* ── PANELS ── */
  .panels { display:grid; grid-template-columns:1fr 1fr; gap:10px; margin-top:10px; }
  @media (max-width:580px) { .panels { grid-template-columns:1fr; } }
  .panel {
    background:var(--panel); border:1px solid var(--border); border-radius:4px;
    padding:16px 18px; position:relative; overflow:hidden;
  }
  .panel::before {
    content:''; position:absolute; top:0; left:0; right:0; height:2px;
    background:linear-gradient(90deg,transparent,var(--green),transparent); opacity:0.4;
  }
  .panel-label { font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:3px; color:var(--muted); text-transform:uppercase; margin-bottom:10px; }
  .coord-row { display:flex; align-items:baseline; gap:7px; margin-bottom:5px; }
  .coord-key { font-family:'Share Tech Mono',monospace; font-size:10px; color:var(--muted); min-width:30px; }
  .coord-val { font-family:'Share Tech Mono',monospace; font-size:19px; color:var(--green); letter-spacing:1px; text-shadow:0 0 10px rgba(0,255,100,0.45); }
  .coord-unit { font-size:10px; color:var(--muted); }
  .stat-grid { display:grid; grid-template-columns:1fr 1fr; gap:10px; }
  .stat-label { font-family:'Share Tech Mono',monospace; font-size:8px; letter-spacing:2px; color:var(--muted); margin-bottom:2px; }
  .stat-val { font-family:'Share Tech Mono',monospace; font-size:16px; color:var(--text); }
  .stat-val.accent { color:var(--green); }
  .acc-bar-wrap { margin-top:5px; height:3px; background:var(--border); border-radius:2px; overflow:hidden; }
  .acc-bar { height:100%; background:linear-gradient(90deg,var(--green),#00ffc8); border-radius:2px; transition:width 0.8s ease; box-shadow:0 0 6px var(--green); }
  .copy-btn {
    font-family:'Share Tech Mono',monospace; font-size:9px; letter-spacing:2px;
    color:var(--muted); background:none; border:1px solid var(--muted);
    padding:3px 8px; border-radius:2px; cursor:pointer; transition:all 0.2s; margin-top:10px;
  }
  .copy-btn:hover { color:var(--green); border-color:var(--green); }

  /* ── LEAFLET PERF ── */
  .leaflet-container { background:#040a07 !important; }
  .leaflet-tile-pane { filter:brightness(0.8) saturate(0.5) hue-rotate(95deg); will-change:transform; }
  .leaflet-zoom-animated { will-change:transform; }
  .leaflet-control-zoom, .leaflet-control-attribution { display:none; }
</style>
</head>
<body>
<div class="container">

  <header>
    <div class="logo">// WARPAH EXPLOITS //</div>
    <h1>GPS <span>TRACKER</span></h1>
    <div class="sub">— HIGH ACCURACY LOCATION SYSTEM —</div>
  </header>

  <div id="map-wrapper">
    <div class="map-corner tl"></div>
    <div class="map-corner tr"></div>
    <div class="map-corner bl"></div>
    <div class="map-corner br"></div>
    <div id="map-placeholder">
      <div class="radar-wrap">
        <div class="radar-ring"></div>
        <div class="radar-ring2"></div>
        <div class="radar-sweep"></div>
        <div class="radar-dot"></div>
      </div>
      <p>AWAITING SIGNAL...</p>
    </div>
    <div id="map"></div>
    <button id="lock-btn" class="locked">⊕ LOCK</button>
  </div>

  <div id="status-bar">
    <div class="dot" id="dot"></div>
    <span id="status-text">SISTEM SIAP — KLIK TOMBOL UNTUK MULAI</span>
    <span id="kalman-badge">KALMAN OFF</span>
  </div>

  <button id="btn-locate"><span>⊕ LACAK LOKASI SAYA</span></button>

  <div class="panels">
    <div class="panel">
      <div class="panel-label">// KOORDINAT (KALMAN FILTERED)</div>
      <div class="coord-row">
        <span class="coord-key">LAT</span>
        <span class="coord-val" id="lat">—</span>
        <span class="coord-unit">°</span>
      </div>
      <div class="coord-row">
        <span class="coord-key">LNG</span>
        <span class="coord-val" id="lng">—</span>
        <span class="coord-unit">°</span>
      </div>
      <button class="copy-btn" onclick="copyCoords()">[ COPY KOORDINAT ]</button>
    </div>
    <div class="panel">
      <div class="panel-label">// DETAIL SINYAL</div>
      <div class="stat-grid">
        <div class="stat-item">
          <div class="stat-label">AKURASI GPS</div>
          <div class="stat-val accent" id="accuracy">— m</div>
          <div class="acc-bar-wrap"><div class="acc-bar" id="acc-bar" style="width:0%"></div></div>
        </div>
        <div class="stat-item">
          <div class="stat-label">AKURASI FILTER</div>
          <div class="stat-val accent" id="k-accuracy">— m</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">ALTITUDE</div>
          <div class="stat-val" id="altitude">— m</div>
        </div>
        <div class="stat-item">
          <div class="stat-label">SAMPEL</div>
          <div class="stat-val" id="samples">0</div>
        </div>
      </div>
    </div>
  </div>

</div>

<script src="https://cdnjs.cloudflare.com/ajax/libs/leaflet/1.9.4/leaflet.min.js"></script>
<script>
/* ── KALMAN FILTER ── */
class KalmanFilter {
  constructor() { this.reset(); }
  reset() { this.lat=null; this.lng=null; this.variance=-1; this.lastTs=null; }
  process(lat, lng, accuracy, ts) {
    if (accuracy < 1) accuracy = 1;
    if (this.variance < 0) {
      this.lat = lat; this.lng = lng;
      this.variance = accuracy * accuracy;
      this.lastTs = ts;
      return { lat, lng, accuracy };
    }
    const dt = Math.max(0, (ts - this.lastTs) / 1000);
    this.lastTs = ts;
    if (dt > 0) this.variance += dt * 9; // 3 m/s process noise squared
    const K = this.variance / (this.variance + accuracy * accuracy);
    this.lat += K * (lat - this.lat);
    this.lng += K * (lng - this.lng);
    this.variance *= (1 - K);
    return { lat: this.lat, lng: this.lng, accuracy: Math.sqrt(this.variance) };
  }
}

/* ── STATE ── */
let map=null, marker=null, circle=null, watchId=null;
let locked=true, userPanning=false, sampleCount=0;
const kalman = new KalmanFilter();

function setStatus(msg, state) {
  document.getElementById('status-text').textContent = msg;
  document.getElementById('dot').className = 'dot' + (state ? ' '+state : '');
}

/* ── MAP INIT (once) ── */
function initMap(lat, lng) {
  document.getElementById('map-placeholder').style.display = 'none';
  if (map) return;

  map = L.map('map', {
    zoomControl: false,
    attributionControl: false,
    preferCanvas: true,          // Canvas renderer — much faster on mobile
    zoomAnimation: true,
    fadeAnimation: true,
    markerZoomAnimation: true,
    wheelPxPerZoomLevel: 80,
  }).setView([lat, lng], 18);

  L.tileLayer('https://{s}.tile.openstreetmap.org/{z}/{x}/{y}.png', {
    maxZoom: 21,
    maxNativeZoom: 19,
    keepBuffer: 6,               // pre-cache 6 tiles buffer — less blank on zoom
    updateWhenIdle: false,
    updateWhenZooming: false,    // don't re-fetch during animation = smooth
    crossOrigin: true,
  }).addTo(map);

  // Detect manual pan → unlock follow
  map.on('dragstart', () => { userPanning=true; setLock(false); });
  map.on('dragend',   () => { userPanning=false; });

  // Custom marker
  const icon = L.divIcon({
    html: `
      <div style="position:relative;width:24px;height:24px;transform:translate(-12px,-12px)">
        <div style="position:absolute;inset:0;border-radius:50%;border:2px solid #00FF64;animation:gps-pulse 1.8s ease-out infinite;"></div>
        <div style="position:absolute;inset:5px;border-radius:50%;background:#00FF64;box-shadow:0 0 10px #00FF64,0 0 22px rgba(0,255,100,0.35);"></div>
      </div>
      <style>@keyframes gps-pulse{0%{transform:scale(1);opacity:0.85}70%{transform:scale(2.8);opacity:0}100%{transform:scale(1);opacity:0}}</style>`,
    className: '', iconSize: [0,0], iconAnchor: [0,0]
  });

  marker = L.marker([lat, lng], { icon, zIndexOffset: 1000 }).addTo(map);

  document.getElementById('lock-btn').addEventListener('click', () => {
    setLock(!locked);
    if (locked && marker) map.setView(marker.getLatLng(), map.getZoom(), { animate:true, duration:0.5 });
  });
}

function setLock(state) {
  locked = state;
  const btn = document.getElementById('lock-btn');
  btn.textContent = state ? '⊕ LOCK' : '○ FREE';
  btn.classList.toggle('locked', state);
}

/* ── UPDATE MAP (smooth, no lag) ── */
function updateMap(lat, lng, accuracyM) {
  if (!map) return;
  const ll = L.latLng(lat, lng);

  // Move marker — Leaflet handles smooth transition internally
  marker.setLatLng(ll);

  // Reuse circle layer — avoid remove/add = no redraw flash
  if (!circle) {
    circle = L.circle(ll, {
      radius: Math.max(accuracyM, 3),
      color:'#00FF64', fillColor:'#00FF64',
      fillOpacity:0.07, weight:1, dashArray:'5 5'
    }).addTo(map);
  } else {
    circle.setLatLng(ll);
    circle.setRadius(Math.max(accuracyM, 3));
  }

  // Only follow if locked and user not panning
  if (locked && !userPanning) {
    // panTo is smooth, doesn't reset zoom like setView
    map.panTo(ll, { animate:true, duration:0.6, easeLinearity:0.4 });
  }
}

/* ── GPS CALLBACK ── */
function onPosition(pos) {
  const { latitude, longitude, accuracy, altitude } = pos.coords;
  sampleCount++;

  const f = kalman.process(latitude, longitude, accuracy, pos.timestamp);

  // DOM updates
  document.getElementById('lat').textContent       = f.lat.toFixed(7);
  document.getElementById('lng').textContent       = f.lng.toFixed(7);
  document.getElementById('accuracy').textContent  = Math.round(accuracy) + ' m';
  document.getElementById('k-accuracy').textContent = Math.round(f.accuracy) + ' m';
  document.getElementById('altitude').textContent  = altitude != null ? Math.round(altitude) + ' m' : '— m';
  document.getElementById('samples').textContent   = sampleCount;

  const pct = Math.max(0, Math.min(100, (1 - Math.min(accuracy, 100)/100)*100));
  document.getElementById('acc-bar').style.width = pct + '%';

  if (sampleCount >= 3) {
    const badge = document.getElementById('kalman-badge');
    badge.textContent = 'KALMAN ON';
    badge.classList.add('good');
  }

  initMap(f.lat, f.lng);
  updateMap(f.lat, f.lng, f.accuracy);

  const btn = document.getElementById('btn-locate');
  btn.disabled = false;
  btn.querySelector('span').textContent = '↺ RESTART TRACKING';

  setStatus(`LIVE  RAW ±${Math.round(accuracy)}m  |  FILTER ±${Math.round(f.accuracy)}m`, 'active');
}

function onError(err) {
  const msgs = { 1:'AKSES DITOLAK — IZINKAN LOKASI DI BROWSER', 2:'SINYAL GPS TIDAK TERSEDIA', 3:'TIMEOUT — PINDAH KE TEMPAT TERBUKA' };
  setStatus('ERROR: ' + (msgs[err.code] || err.message), 'error');
  document.getElementById('btn-locate').disabled = false;
  document.getElementById('btn-locate').querySelector('span').textContent = '⊕ COBA LAGI';
}

/* ── START ── */
function getLocation() {
  if (!navigator.geolocation) { setStatus('ERROR: BROWSER TIDAK SUPPORT GPS','error'); return; }

  if (watchId !== null) { navigator.geolocation.clearWatch(watchId); watchId=null; }
  kalman.reset(); sampleCount=0;

  const badge = document.getElementById('kalman-badge');
  badge.textContent='KALMAN OFF'; badge.classList.remove('good');

  const btn = document.getElementById('btn-locate');
  btn.disabled = true;
  btn.querySelector('span').textContent = '◌ MENCARI SINYAL GPS...';
  setStatus('SCANNING — MENGUMPULKAN DATA GPS...', 'active');

  watchId = navigator.geolocation.watchPosition(onPosition, onError, {
    enableHighAccuracy: true,   // force GPS chip bukan WiFi/IP
    timeout: 20000,
    maximumAge: 0               // jangan pakai cache
  });
}

document.getElementById('btn-locate').addEventListener('click', getLocation);

function copyCoords() {
  const lat = document.getElementById('lat').textContent;
  const lng = document.getElementById('lng').textContent;
  if (lat === '—') return;
  navigator.clipboard.writeText(`${lat}, ${lng}`).then(() => {
    setStatus('✓ KOORDINAT DISALIN KE CLIPBOARD', 'active');
  });
}
</script>
</body>
</html>
